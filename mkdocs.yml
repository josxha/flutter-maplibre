site_name: "MapLibre Flutter"
site_description: "Permissive and performant mapping library that supports Mapbox Vector Tiles (MVT) powered by MapLibre SDKs."
site_author: "josxha"
site_url: "https://flutter-maplibre.pages.dev/"
use_directory_urls: true
repo_url: https://github.com/josxha/flutter-maplibre
edit_uri: edit/main/website/
docs_dir: website

#nav:
#  - Home: index.md
#  - Docs:
#      - Index: docs/index.md
#  - features/
#  - Compare:
#      - Features: compare/features/
#      - Similar Packages: compare/similar-packages/
#  - Architecture: architecture/
#  - API: https://pub.dev/documentation/maplibre/latest/maplibre/
#  - Demo: /demo/
#  - pub.dev: https://pub.dev/packages/maplibre

theme:
  name: "material"
  logo: "assets/images/logo.svg"
  favicon: "assets/images/favicon32x32.png"
  icon:
    repo: fontawesome/brands/github
  language: "en"
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: "lucide/sun-moon"
        name: "Switch to light mode"
    - media: "(prefers-color-scheme: light)"
      scheme: "default"
      toggle:
        icon: "lucide/sun"
        name: "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: "slate"
      toggle:
        icon: "lucide/moon"
        name: "Switch to system preference"

extra:
  generator: false
  social:
    - icon: "fontawesome/brands/github"
      link: "https://github.com/josxha/flutter-maplibre"
    - icon: "fontawesome/brands/slack"
      link: "https://slack.openstreetmap.us/"
    - icon: "fontawesome/brands/stack-overflow"
      link: "https://stackoverflow.com/questions/tagged/maplibre-gl"

markdown_extensions:
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
