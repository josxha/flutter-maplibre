name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Ensure that new pushes/updates cancel running jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-test-web:
    name: "[Web] Integration tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: examples
    strategy:
      fail-fast: false
      matrix:
        sdk: ['']
    env:
      CI: true
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
      - name: "Setup Flutter SDK"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.sdk }}
          cache: true
      - name: "Enable Flutter web support"
        run: flutter config --enable-web
      - name: "Clean previous builds"
        run: flutter clean
      - name: "Install dependencies"
        run: flutter pub get
      - name: "Install ChromeDriver (stable)"
        run: |
          npm install -g @puppeteer/browsers
          npx @puppeteer/browsers install chromedriver@stable
          echo "$HOME/.cache/puppeteer/chromedriver/linux-*/chromedriver" >> $GITHUB_PATH
      - name: "Start ChromeDriver"
        run: chromedriver --port=4444 --allowed-ips='' &
      - name: "Run web integration tests with Xvfb"
        run: |
          xvfb-run -a flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/main.dart \
            -d chrome \
            --no-headless \
            --web-browser-flag=--enable-webgl \
            --web-browser-flag=--ignore-gpu-blocklist \
            --web-browser-flag=--use-gl=swiftshader \
            --web-browser-flag=--use-angle=swiftshader